version: '3.8'
services:
  drupal:
    build: .
    ports:
      - "8080:80"
    volumes:
      - drupal:/var/www/html
    depends_on:
      - db
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: drupal
      POSTGRES_DB: drupal
      POSTGRES_USER: drupal
    volumes:
      - db:/var/lib/postgresql/data
volumes:
  drupal:
  db:
